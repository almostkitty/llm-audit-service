<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}LLM Audit{% endblock %}</title>
  <style>
    :root {
      --bg: rgb(245, 249, 251);
      --surface: rgb(255, 255, 255);
      --text: rgb(58, 67, 85);
      --muted: rgb(94, 108, 132);
      --border: rgb(192, 203, 217);
      --accent: rgb(54, 133, 218);
      --accent-muted: rgb(208, 215, 225);
      --radius-control: 8px;
      --radius-card: 10px;
      --color-ok: #166534;
      --color-ok-bg: #ecfdf5;
      --color-ok-border: #a7f3d0;
      --color-err: #b91c1c;
      --color-err-bg: #fef2f2;
      --color-err-border: #fecaca;
      --color-warn: #92400e;
      --color-warn-bg: #fffbeb;
      --color-warn-border: #f59e0b;
    }
  </style>
  <link rel="stylesheet" href="/static/css/site.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
  {% block head_extra %}{% endblock %}
</head>
<body data-active-page="{{ active_page|default('', true) }}">
  <header class="site-header">
    <div class="shell">
      {% include "_nav.html" %}
    </div>
  </header>
  <main class="shell">
    {% block content %}{% endblock %}
  </main>
  <footer class="shell site-footer">
    © 2026 Герман Пальчук · @almostkitty
  </footer>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/api_utils.js"></script>
  <script src="/static/js/nav.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
