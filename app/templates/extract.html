{% extends "base.html" %}
{% block title %}Извлечение текста — LLM Audit{% endblock %}
{% block content %}
<div class="card">
  <h1>Извлечение текста</h1>
  <p class="hint">Поддерживаются PDF, DOCX, RTF, ODT, TXT.</p>
  <p>
    <input type="file" id="fileInput" accept=".pdf,.docx,.rtf,.odt,.txt,text/plain" />
  </p>
  <p><button id="extractBtn" type="button">Извлечь</button></p>
</div>
<div class="card">
  <h2>Результат</h2>
  <textarea id="output" rows="18" readonly placeholder="Здесь появится текст"></textarea>
</div>
{% endblock %}
{% block scripts %}
<script>
  const fileInput = document.getElementById("fileInput");
  const extractBtn = document.getElementById("extractBtn");
  const output = document.getElementById("output");

  extractBtn.addEventListener("click", async () => {
    const file = fileInput.files[0];
    if (!file) {
      output.value = "Выберите файл.";
      return;
    }

    output.value = "Извлекаем...";

    const formData = new FormData();
    formData.append("file", file);

    try {
      const res = await fetch("/extract", { method: "POST", body: formData });
      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        output.value = data.detail || "Ошибка: " + res.status;
        return;
      }

      output.value = data.text ?? JSON.stringify(data, null, 2);
    } catch (e) {
      output.value = "Ошибка запроса.";
    }
  });
</script>
{% endblock %}
