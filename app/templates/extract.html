{% extends "base.html" %}
{% block title %}Извлечение текста — LLM Audit{% endblock %}
{% block content %}
<div class="card">
  <h1>Извлечение текста</h1>
  <p class="hint">Поддерживаются PDF, DOCX, RTF, ODT, TXT.</p>
  <p>
    <input type="file" id="fileInput" accept=".pdf,.docx,.rtf,.odt,.txt,text/plain" />
  </p>
  <p><button id="extractBtn" type="button">Извлечь</button></p>
</div>
<div class="card">
  <h2>Результат</h2>
  <textarea id="output" rows="18" readonly placeholder="Здесь появится текст"></textarea>
</div>
{% endblock %}
{% block scripts %}
<script>
  const fileInput = document.getElementById("fileInput");
  const extractBtn = document.getElementById("extractBtn");
  const output = document.getElementById("output");

  function setOutput(text) {
    output.value = text;
  }

  async function parseJsonOrEmpty(res) {
    return res.json().catch(() => ({}));
  }

  extractBtn.addEventListener("click", async () => {
    const file = fileInput.files[0];
    if (!file) {
      setOutput("Выберите файл.");
      return;
    }

    setOutput("Извлекаем...");

    const formData = new FormData();
    formData.append("file", file);

    try {
      const res = await fetch("/extract", { method: "POST", body: formData });
      const data = await parseJsonOrEmpty(res);

      if (!res.ok) {
        setOutput(data.detail || "Ошибка: " + res.status);
        return;
      }

      setOutput(data.text ?? JSON.stringify(data, null, 2));
    } catch (e) {
      setOutput("Ошибка запроса.");
    }
  });
</script>
{% endblock %}
