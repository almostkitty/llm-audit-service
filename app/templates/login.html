{% extends "base.html" %}
{% block title %}Вход — LLM Audit{% endblock %}
{% block content %}
<div class="auth-page">
<div class="card card--auth">
  <h1>Вход</h1>
  <p class="hint auth-card-lead">Нет аккаунта? <a href="/register">Регистрация</a></p>

  <form id="loginForm" class="auth-form auth-form--stacked">
    <div class="auth-field">
      <label class="visually-hidden" for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="username" placeholder="Email" required />
    </div>
    <div class="auth-field">
      <label class="visually-hidden" for="password">Пароль</label>
      <div class="auth-password-wrap">
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Пароль" required minlength="6" />
        <button type="button" class="auth-password-toggle" aria-label="Показать пароль" aria-pressed="false"></button>
      </div>
    </div>
    <div class="auth-form__actions">
      <button type="submit" class="btn-wide">Войти</button>
    </div>
  </form>

  <p id="authError" class="form-error" role="alert"></p>
</div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/auth_pages.js"></script>
<script>
  LlmAuditAuthPages.initPasswordToggles(document.getElementById("loginForm"));
  LlmAuditAuthPages.bindAuthSubmit("loginForm", {
    url: "/api/auth/login",
    buildBody: function (fd) {
      return { email: fd.get("email"), password: fd.get("password") };
    },
    errorFallback: "Ошибка входа",
  });
</script>
{% endblock %}
