{% extends "base.html" %}
{% block title %}Регистрация — LLM Audit{% endblock %}
{% block content %}
<div class="auth-page">
<div class="card card--auth">
  <h1>Регистрация</h1>
  <p class="hint auth-card-lead">Уже есть аккаунт? <a href="/login">Вход</a></p>

  <form id="registerForm" class="auth-form auth-form--stacked">
    <div class="auth-field">
      <label class="visually-hidden" for="firstName">Имя</label>
      <input id="firstName" name="first_name" type="text" maxlength="100" autocomplete="given-name" placeholder="Имя" required />
    </div>
    <div class="auth-field">
      <label class="visually-hidden" for="lastName">Фамилия</label>
      <input id="lastName" name="last_name" type="text" maxlength="100" autocomplete="family-name" placeholder="Фамилия" required />
    </div>
    <div class="auth-field">
      <label class="visually-hidden" for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" placeholder="Email" required />
    </div>
    <div class="auth-field">
      <label class="visually-hidden" for="password">Пароль</label>
      <div class="auth-password-wrap">
        <input id="password" name="password" type="password" autocomplete="new-password" placeholder="Пароль" required minlength="6" />
        <button type="button" class="auth-password-toggle" aria-label="Показать пароль" aria-pressed="false"></button>
      </div>
    </div>
    <div class="auth-field">
      <label class="visually-hidden" for="passwordConfirm">Повторите пароль</label>
      <div class="auth-password-wrap">
        <input id="passwordConfirm" name="password_confirm" type="password" autocomplete="new-password" placeholder="Повторите пароль" required minlength="6" />
        <button type="button" class="auth-password-toggle" aria-label="Показать пароль" aria-pressed="false"></button>
      </div>
    </div>
    <fieldset class="auth-field">
      <legend class="field-label">Роль</legend>
      <div class="auth-role-options">
        <label class="auth-role-option">
          <input type="radio" name="role" value="student" checked />
          <span>Студент</span>
        </label>
        <label class="auth-role-option">
          <input type="radio" name="role" value="teacher" />
          <span>Преподаватель</span>
        </label>
      </div>
    </fieldset>
    <div class="auth-form__actions">
      <button type="submit" class="btn-wide">Зарегистрироваться</button>
    </div>
  </form>

  <p id="authError" class="form-error" role="alert"></p>
</div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/auth_pages.js"></script>
<script>
  LlmAuditAuthPages.initPasswordToggles(document.getElementById("registerForm"));
  LlmAuditAuthPages.bindAuthSubmit("registerForm", {
    url: "/api/auth/register",
    validate: function (fd) {
      if (fd.get("password") !== fd.get("password_confirm")) {
        return "Пароли не совпадают";
      }
      return null;
    },
    buildBody: function (fd) {
      return {
        email: fd.get("email"),
        password: fd.get("password"),
        password_confirm: fd.get("password_confirm"),
        role: fd.get("role") || "student",
        first_name: fd.get("first_name"),
        last_name: fd.get("last_name"),
      };
    },
    errorFallback: "Ошибка регистрации",
  });
</script>
{% endblock %}
