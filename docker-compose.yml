services:
  llm-audit-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-audit-service
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET: "${JWT_SECRET:-dev-secret-min-32-chars-long!!}"
      ENABLE_CATBOOST: "${ENABLE_CATBOOST:-1}"
      CATBOOST_MODEL_PATH: "${CATBOOST_MODEL_PATH:-/app/models/catboost/catboost_model.cbm}"
      ENABLE_PERPLEXITY: "${ENABLE_PERPLEXITY:-0}"
    volumes:
      - ./models/catboost:/app/models/catboost:ro
    restart: unless-stopped
